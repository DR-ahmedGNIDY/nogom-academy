# Nginx site config for the Flutter Web build of Future Stars Academy
# (أكاديمية نجوم المستقبل), served at https://app2.nosait.com.
#
# Deployment (manual — nothing here is run automatically):
#   1. flutter build web --release   (run inside frontend/, produces build/web)
#   2. Copy the *contents* of build/web/ to /var/www/app2 on the server
#      (rsync -av --delete build/web/ user@server:/var/www/app2/)
#   3. Put this file at /etc/nginx/sites-available/app2.nosait.com,
#      symlink it into sites-enabled, then `nginx -t && systemctl reload nginx`.
#   4. Point DNS for app2.nosait.com at this server and issue a TLS cert
#      (e.g. certbot --nginx -d app2.nosait.com) — the server{} block below
#      is HTTP-only; certbot (or your ACME tool) will add the 443 block.
#
# Backend note: this only serves the compiled Flutter app. The API it talks
# to (AppConstants.baseUrl, default https://nogom-academy.vercel.app/api/v1)
# is unaffected by this config. For the browser to be allowed to call that
# API from this origin, set FRONTEND_URL=https://app2.nosait.com in the
# backend's environment — backend/src/server.js already reads that var for
# CORS, no backend code change needed.

server {
    listen 80;
    listen [::]:80;
    server_name app2.nosait.com;

    root /var/www/app2;
    index index.html;

    # Flutter's clean (path-based) URL strategy means every non-file route
    # (e.g. /players, /reports) must fall through to index.html so GoRouter
    # can handle it client-side — this is what makes direct URL entry and
    # page refresh work on any route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for content-hashed build output (main.dart.js,
    # flutter.js, CanvasKit/asset bundle files all get new names on rebuild).
    location ~* \.(?:js|css|wasm)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /icons/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html itself must never be cached, or deployments won't be
    # picked up by returning visitors until the cache expires.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;
}
