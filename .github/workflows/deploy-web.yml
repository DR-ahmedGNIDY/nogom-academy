name: Deploy Flutter Web to Vercel

# Vercel's native Git integration for this project is intentionally
# disconnected (`vercel git disconnect`). Building Flutter from source on
# Vercel's own build container runs out of memory, and — worse — its
# zero-config "build" of an unsupported framework silently produces an empty
# deployment that raced against and overwrote the real one here, causing a
# live 404. This workflow is now the *only* thing that builds and deploys
# this project; do not reconnect Git in the Vercel dashboard.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build web
        run: flutter build web --release --no-wasm-dry-run

      - name: Verify build output
        run: |
          test -s build/web/index.html || { echo "::error::build/web/index.html missing or empty — aborting deploy"; exit 1; }
          test -s build/web/main.dart.js || { echo "::error::build/web/main.dart.js missing or empty — aborting deploy"; exit 1; }
          test -s build/web/flutter.js || { echo "::error::build/web/flutter.js missing or empty — aborting deploy"; exit 1; }
          test -d build/web/assets || { echo "::error::build/web/assets/ missing — aborting deploy"; exit 1; }
          echo "Build output verified ($(du -sh build/web | cut -f1)):"
          ls -la build/web

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Assemble Vercel Build Output (v3) from build/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # `vercel deploy build/web` (without --prebuilt) re-runs Vercel's own
          # zero-config build against the uploaded folder using the project's
          # framework settings. Since build/web has no package.json, that
          # build silently produces an empty deployment -> live 404. Building
          # the Build Output API (v3) structure ourselves and deploying with
          # --prebuilt makes Vercel skip its build step entirely and publish
          # these exact files.
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -r build/web/. .vercel/output/static/
          cat > .vercel/output/config.json <<'EOF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Verify Build Output assembled correctly
        run: |
          test -s .vercel/output/static/index.html || { echo "::error::.vercel/output/static/index.html missing"; exit 1; }
          test -s .vercel/output/static/main.dart.js || { echo "::error::.vercel/output/static/main.dart.js missing"; exit 1; }
          test -s .vercel/output/config.json || { echo "::error::.vercel/output/config.json missing"; exit 1; }

      - name: Deploy prebuilt output to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
